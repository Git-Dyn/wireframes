<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prévia Exclusiva · Siena Digital</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #070b14;
            --bg-dark: #0F172A;
            --bg-surface: #1a2234;
            --bg-surface-light: #243044;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #5a6a80;
            --accent: #EF4444;
            --accent-light: #F87171;
            --accent-glow: rgba(239, 68, 68, 0.12);
            --device-dark: #1c1c1e;
            --device-light: #3a3a3c;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Grain texture ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.03;
            pointer-events: none;
            z-index: 10000;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px;
        }

        /* ── Ambient glow ── */
        .ambient {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(ellipse 900px 700px at 10% 15%, rgba(239,68,68,0.05) 0%, transparent 70%),
                radial-gradient(ellipse 700px 900px at 90% 75%, rgba(239,68,68,0.03) 0%, transparent 70%),
                radial-gradient(ellipse 500px 500px at 50% 40%, rgba(15,23,42,0.4) 0%, transparent 70%);
        }

        .content { position: relative; z-index: 1; }

        /* ── HEADER ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 28px 48px;
            max-width: 1280px;
            margin: 0 auto;
            opacity: 0;
            animation: fadeDown 0.8s ease forwards;
        }

        .logo-link {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo {
            height: 36px;
            opacity: 0.9;
            transition: opacity 0.3s;
        }

        .logo-link:hover .logo { opacity: 1; }

        .logo-text {
            font-family: 'Sora', sans-serif;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            opacity: 0.85;
            display: none;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            background: var(--accent-glow);
            border: 1px solid rgba(239,68,68,0.15);
            border-radius: 100px;
            font-family: 'Sora', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent-light);
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s ease infinite;
        }

        /* ── HERO ── */
        .hero {
            text-align: center;
            padding: 56px 40px 32px;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero-overline {
            font-family: 'Sora', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.15s forwards;
        }

        .hero-title {
            font-family: 'Sora', sans-serif;
            font-size: clamp(32px, 5vw, 56px);
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: -0.03em;
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.3s forwards;
        }

        .client-name {
            color: var(--accent);
            font-weight: 800;
        }

        .hero-note {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.45s forwards;
        }

        /* ── TOGGLE ── */
        .toggle-wrap {
            display: flex;
            justify-content: center;
            padding: 36px 0 8px;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.55s forwards;
        }

        .toggle {
            display: flex;
            background: var(--bg-surface);
            border-radius: 100px;
            padding: 4px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .toggle-pill {
            position: absolute;
            top: 4px;
            left: 4px;
            width: calc(33.333% - 4px);
            height: calc(100% - 8px);
            background: var(--accent);
            border-radius: 100px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 12px rgba(239,68,68,0.3);
        }

        .toggle-pill.center { transform: translateX(100%); }
        .toggle-pill.right { transform: translateX(200%); }

        .toggle-btn {
            padding: 10px 28px;
            font-family: 'Sora', sans-serif;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            position: relative;
            z-index: 1;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-btn.active { color: #fff; }

        .toggle-btn svg { width: 15px; height: 15px; }

        /* ── MOCKUP AREA ── */
        .mockup-area {
            position: relative;
            padding: 28px 40px 20px;
            opacity: 0;
            animation: fadeUp 1s ease 0.65s forwards;
        }

        .mockup-view {
            display: none;
            justify-content: center;
        }
        .mockup-view.active {
            display: flex;
        }

        /* ── MONITOR ── */
        .monitor-frame {
            background: linear-gradient(160deg, #3a3a3c 0%, #1c1c1e 40%);
            border-radius: 14px;
            padding: 10px 10px 6px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.06),
                inset 0 1px 0 rgba(255,255,255,0.06),
                0 30px 80px rgba(0,0,0,0.6),
                0 0 100px rgba(239,68,68,0.03);
        }

        .monitor-bezel-top {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 18px;
        }

        .monitor-camera {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #48484a;
            box-shadow: inset 0 0 2px rgba(0,0,0,0.5);
        }

        .monitor-screen {
            width: 900px;
            height: 562px;
            border-radius: 4px;
            overflow: hidden;
            background: #0a0a0a;
        }

        .monitor-screen iframe {
            width: 1440px;
            height: 900px;
            transform: scale(0.625);
            transform-origin: top left;
            border: none;
            display: block;
        }

        .monitor-bezel-bottom { height: 8px; }

        .monitor-neck {
            width: 72px;
            height: 32px;
            background: linear-gradient(160deg, #2c2c2e, #1c1c1e);
            margin: 0 auto;
            border-radius: 0 0 2px 2px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
        }

        .monitor-base {
            width: 180px;
            height: 8px;
            background: linear-gradient(160deg, #2c2c2e, #1c1c1e);
            margin: 0 auto;
            border-radius: 8px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.04),
                0 4px 12px rgba(0,0,0,0.4);
        }

        /* ── TABLET (iPad) ── */
        .tablet-wrap {
            transform: scale(0.72);
            transform-origin: top center;
        }

        .tablet {
            position: relative;
            background: linear-gradient(160deg, #3a3a3c 0%, #1c1c1e 40%);
            border-radius: 24px;
            padding: 16px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.08),
                inset 0 1px 0 rgba(255,255,255,0.06),
                0 12px 40px rgba(0,0,0,0.4),
                0 0 60px rgba(239,68,68,0.02);
        }

        .tablet-camera {
            position: absolute;
            top: 50%;
            left: 7px;
            transform: translateY(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #48484a;
            box-shadow: inset 0 0 2px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .tablet-screen {
            width: 820px;
            height: 580px;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
            position: relative;
        }

        .tablet-screen iframe {
            width: 820px;
            height: 1180px;
            border: none;
            display: block;
        }

        .tablet-btn-power {
            position: absolute;
            top: -2px;
            right: 80px;
            width: 52px;
            height: 3px;
            background: linear-gradient(90deg, #3a3a3c, #2c2c2e);
            border-radius: 2px 2px 0 0;
        }

        .tablet-btn-vol1 {
            position: absolute;
            right: -2px;
            top: 80px;
            width: 3px;
            height: 40px;
            background: linear-gradient(180deg, #3a3a3c, #2c2c2e);
            border-radius: 0 2px 2px 0;
        }

        .tablet-btn-vol2 {
            position: absolute;
            right: -2px;
            top: 128px;
            width: 3px;
            height: 40px;
            background: linear-gradient(180deg, #3a3a3c, #2c2c2e);
            border-radius: 0 2px 2px 0;
        }

        /* ── PHONE ── */
        .phone-wrap {
            transform: scale(0.78);
            transform-origin: top center;
        }

        .phone {
            position: relative;
            background: linear-gradient(160deg, #3a3a3c 0%, #1c1c1e 40%);
            border-radius: 48px;
            padding: 14px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.08),
                inset 0 1px 0 rgba(255,255,255,0.06),
                0 30px 80px rgba(0,0,0,0.6),
                0 0 100px rgba(239,68,68,0.03);
            animation: float 6s ease-in-out infinite;
        }

        .phone-island {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 28px;
            background: #000;
            border-radius: 20px;
            z-index: 10;
        }

        .phone-screen {
            width: 390px;
            height: 844px;
            border-radius: 36px;
            overflow: hidden;
            background: #fff;
        }

        .phone-screen iframe {
            width: 390px;
            height: 844px;
            border: none;
            display: block;
        }

        .phone-home {
            position: absolute;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            width: 128px;
            height: 5px;
            background: rgba(255,255,255,0.12);
            border-radius: 3px;
            z-index: 10;
        }

        .phone-btn-power {
            position: absolute;
            right: -2px;
            top: 168px;
            width: 3px;
            height: 72px;
            background: linear-gradient(180deg, #3a3a3c, #2c2c2e);
            border-radius: 0 2px 2px 0;
        }

        .phone-btn-silent {
            position: absolute;
            left: -2px;
            top: 128px;
            width: 3px;
            height: 28px;
            background: linear-gradient(180deg, #3a3a3c, #2c2c2e);
            border-radius: 2px 0 0 2px;
        }

        .phone-btn-vol1 {
            position: absolute;
            left: -2px;
            top: 184px;
            width: 3px;
            height: 52px;
            background: linear-gradient(180deg, #3a3a3c, #2c2c2e);
            border-radius: 2px 0 0 2px;
        }

        .phone-btn-vol2 {
            position: absolute;
            left: -2px;
            top: 244px;
            width: 3px;
            height: 52px;
            background: linear-gradient(180deg, #3a3a3c, #2c2c2e);
            border-radius: 2px 0 0 2px;
        }

        /* ── Reflection shimmer on devices ── */
        .monitor-screen::after,
        .tablet-screen::after,
        .phone-screen::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(115deg,
                transparent 40%,
                rgba(255,255,255,0.02) 45%,
                rgba(255,255,255,0.04) 50%,
                rgba(255,255,255,0.02) 55%,
                transparent 60%);
            pointer-events: none;
            z-index: 5;
            border-radius: inherit;
        }

        .monitor-screen { position: relative; }
        .tablet-screen { position: relative; }
        .phone-screen { position: relative; }

        /* ── URGENCY ── */
        .urgency {
            text-align: center;
            padding: 44px 20px 20px;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.85s forwards;
        }

        .urgency-inner {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }

        .urgency-inner svg {
            width: 13px;
            height: 13px;
            opacity: 0.5;
        }

        /* ── FOOTER ── */
        .footer {
            text-align: center;
            padding: 48px 20px 120px;
            border-top: 1px solid rgba(255,255,255,0.03);
            margin-top: 20px;
        }

        .footer-text {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }

        .footer-text a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-text a:hover { color: var(--accent-light); }

        /* ── FLOATING CTA ── */
        .floating-cta {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 1000;
            opacity: 0;
            animation: fadeUp 0.8s ease 1.1s forwards;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            font-family: 'Sora', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.02em;
            border: none;
            border-radius: 100px;
            cursor: pointer;
            box-shadow:
                0 8px 28px rgba(239,68,68,0.3),
                0 0 0 1px rgba(239,68,68,0.15);
            transition: all 0.3s ease;
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow:
                0 12px 36px rgba(239,68,68,0.4),
                0 0 0 1px rgba(239,68,68,0.25);
        }

        .cta-btn:active { transform: translateY(0); }

        .cta-btn svg { width: 16px; height: 16px; }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 1060px) {
            .monitor-screen {
                width: 720px;
                height: 450px;
            }
            .monitor-screen iframe {
                transform: scale(0.5);
            }
            .tablet-wrap { transform: scale(0.6); }
        }

        @media (max-width: 840px) {
            .header { padding: 24px 28px; }
            .hero { padding: 40px 28px 24px; }

            .monitor-screen {
                width: 560px;
                height: 350px;
            }
            .monitor-screen iframe {
                transform: scale(0.3889);
            }
        }

        @media (max-width: 768px) {
            .toggle-wrap { display: none; }
            .mockup-area { padding: 20px 16px 12px; }

            .mockup-view.desktop { display: none !important; }
            .mockup-view.tablet { display: none !important; }
            .mockup-view.mobile { display: flex !important; }

            .phone-wrap {
                transform: scale(0.62);
                transform-origin: top center;
            }

            .floating-cta { bottom: 20px; right: 20px; }
            .cta-btn { padding: 12px 22px; font-size: 13px; }

            .hero { padding: 36px 24px 20px; }
            .hero-note { font-size: 14px; }
        }

        @media (max-width: 440px) {
            .header { padding: 20px 20px; }
            .phone-wrap { transform: scale(0.52); }
            .badge { font-size: 10px; padding: 6px 12px; }
            .hero { padding: 28px 20px 16px; }
        }

        /* ── Transition between views ── */
        .mockup-view {
            animation: mockupIn 0.5s ease;
        }

        @keyframes mockupIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="ambient"></div>

    <div class="content">
        <!-- Header -->
        <header class="header">
            <a href="https://sienadigital.com.br" class="logo-link" target="_blank" rel="noopener">
                <img
                    src="https://sienadigital.com.br/images/logo.png"
                    alt="Siena Digital"
                    class="logo"
                    onerror="this.src='siena-logo.png';this.onerror=function(){this.style.display='none';this.parentElement.querySelector('.logo-text').style.display='block'}"
                >
                <span class="logo-text">Siena Digital</span>
            </a>
            <div class="badge">
                <span class="badge-dot"></span>
                Prévia Exclusiva
            </div>
        </header>

        <!-- Hero -->
        <section class="hero">
            <p class="hero-overline">Preparado exclusivamente para</p>
            <h1 class="hero-title">
                Prévia interativa do novo site<br>
                <span class="client-name" id="clientName"></span>
            </h1>
            <p class="hero-note">
                Navegue pela prévia interativa abaixo. Todos os elementos funcionam: role, clique, explore.
            </p>
        </section>

        <!-- Toggle -->
        <div class="toggle-wrap">
            <div class="toggle">
                <div class="toggle-pill" id="togglePill"></div>
                <button class="toggle-btn active" data-view="desktop" onclick="switchView('desktop')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                    Desktop
                </button>
                <button class="toggle-btn" data-view="tablet" onclick="switchView('tablet')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="4" y="2" width="16" height="20" rx="2"/>
                        <circle cx="12" cy="18" r="0.5"/>
                    </svg>
                    Tablet
                </button>
                <button class="toggle-btn" data-view="mobile" onclick="switchView('mobile')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="5" y="2" width="14" height="20" rx="2"/>
                        <circle cx="12" cy="18" r="0.5"/>
                    </svg>
                    Mobile
                </button>
            </div>
        </div>

        <!-- Mockup Area -->
        <div class="mockup-area">
            <!-- Desktop -->
            <div class="mockup-view desktop active" id="viewDesktop">
                <div class="monitor">
                    <div class="monitor-frame">
                        <div class="monitor-bezel-top">
                            <div class="monitor-camera"></div>
                        </div>
                        <div class="monitor-screen">
                            <iframe src="" title="Wireframe Desktop" loading="lazy"></iframe>
                        </div>
                        <div class="monitor-bezel-bottom"></div>
                    </div>
                    <div class="monitor-neck"></div>
                    <div class="monitor-base"></div>
                </div>
            </div>

            <!-- Tablet -->
            <div class="mockup-view tablet" id="viewTablet">
                <div class="tablet-wrap">
                    <div class="tablet">
                        <div class="tablet-camera"></div>
                        <div class="tablet-screen">
                            <iframe src="" title="Wireframe Tablet" loading="lazy"></iframe>
                        </div>
                        <div class="tablet-btn-power"></div>
                        <div class="tablet-btn-vol1"></div>
                        <div class="tablet-btn-vol2"></div>
                    </div>
                </div>
            </div>

            <!-- Mobile -->
            <div class="mockup-view mobile" id="viewMobile">
                <div class="phone-wrap">
                    <div class="phone">
                        <div class="phone-island"></div>
                        <div class="phone-screen">
                            <iframe src="" title="Wireframe Mobile" loading="lazy"></iframe>
                        </div>
                        <div class="phone-home"></div>
                        <div class="phone-btn-power"></div>
                        <div class="phone-btn-silent"></div>
                        <div class="phone-btn-vol1"></div>
                        <div class="phone-btn-vol2"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Urgency -->
        <div class="urgency">
            <p class="urgency-inner">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                Prévia disponível até <strong id="expiryDate"></strong>
            </p>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p class="footer-text">
                Desenvolvido por <a href="https://sienadigital.com.br" target="_blank" rel="noopener">Siena Digital</a> · 2026
            </p>
        </footer>
    </div>

    <!-- Floating CTA -->
    <div class="floating-cta">
        <a href="#" class="cta-btn" id="ctaLink">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            Agendar Reunião
        </a>
    </div>

    <script>
        // ╔══════════════════════════════════════════════════════╗
        // ║  CONFIGURAÇÃO DO CLIENTE                            ║
        // ║  Altere apenas este bloco para cada novo projeto.   ║
        // ╚══════════════════════════════════════════════════════╝
        var CONFIG = {
            client:      "Espaço Adapte",
            desktop:     "home-preview.html",
            tablet:      "home-preview.html",
            mobile:      "home-mobile.html",
            meetingUrl:  "#",
            expiryDays:  7
        };

        // ── Populate dynamic content from CONFIG ──
        (function() {
            document.title = "Prévia Exclusiva · " + CONFIG.client + " · Siena Digital";
            document.getElementById("clientName").textContent = CONFIG.client;
            document.querySelector(".mockup-view.desktop iframe").src = CONFIG.desktop;
            document.querySelector(".mockup-view.tablet iframe").src = CONFIG.tablet;
            document.querySelector(".mockup-view.mobile iframe").src = CONFIG.mobile;
            document.getElementById("ctaLink").href = CONFIG.meetingUrl;

            // Expiry date
            var d = new Date();
            d.setDate(d.getDate() + CONFIG.expiryDays);
            var meses = [
                'janeiro','fevereiro','março','abril','maio','junho',
                'julho','agosto','setembro','outubro','novembro','dezembro'
            ];
            document.getElementById('expiryDate').textContent =
                d.getDate() + ' de ' + meses[d.getMonth()] + ' de ' + d.getFullYear();
        })();

        // ── Toggle logic ──
        function switchView(view) {
            var pill = document.getElementById('togglePill');
            var btns = document.querySelectorAll('.toggle-btn');
            var views = document.querySelectorAll('.mockup-view');

            pill.classList.remove('center', 'right');
            if (view === 'tablet') pill.classList.add('center');
            if (view === 'mobile') pill.classList.add('right');

            btns.forEach(function(btn) {
                btn.classList.toggle('active', btn.getAttribute('data-view') === view);
            });

            views.forEach(function(v) {
                var isTarget = v.classList.contains(view);
                v.classList.toggle('active', isTarget);
                v.style.animation = 'none';
                v.offsetHeight;
                v.style.animation = '';
            });
        }
    </script>
</body>
